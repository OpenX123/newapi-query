# 部署服务器上使用：把这个文件放到目标服务器，填好 DATABASE_URL 后执行
#   docker compose pull && docker compose up -d
# 即可拉取最新镜像并更新。
# 注意：真实连接串只写在服务器上的这份文件里，不要提交到 git 仓库。
services:
  newapi-query:
    image: ghcr.io/openx123/newapi-query:latest
    container_name: newapi-query
    ports:
      - "5175:5175"
    restart: unless-stopped
    environment:
      # 站点 1（必填）：new-api 的 PostgreSQL 连接串
      - DATABASE_URL=postgresql://用户名:密码@主机:5432/newapi?sslmode=disable
      # 更多站点按编号往下加，编号需连续；查询时按顺序尝试，key 在哪个库命中就用哪个
      # - DATABASE_URL_2=postgresql://用户名:密码@主机:5432/newapi?sslmode=disable
      # - DATABASE_URL_3=...
      # 明细记录返回条数，默认 1000
      # - LOG_LIMIT=1000
